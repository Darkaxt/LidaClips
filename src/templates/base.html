<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="{{url_for('static', filename='logo.png')}}">
  <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.min.js"
    integrity="sha512-ykZ1QQr0Jy/4ZkvKuqWn4iF3lqPZyij9iRv6sGqLRdTPkY69YX6+7wvVGmsdBbiIfN/8OdsI7HABjvEok6ZopQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <!-- Socket IO -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.js"
    integrity="sha512-tE1z+95+lMCGwy+9PnKgUSIeHhvioC9lMlI7rLWU0Ps3XTdjRygLcy4mLuL0JAoK4TLdQEyP0yOl/9dMOqpH/Q=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <title>LidaClips</title>
</head>

<body class="app-shell">
  <div class="sticky-top">
    <div class="top-strip">
      <div class="top-bar d-flex justify-content-between align-items-center">
        <div class="brand-lockup">
          <img src="{{url_for('static', filename='logo.png')}}" alt="Logo" class="brand-logo">
          <h1 class="title my-1" id="return-to-top">LidaClips</h1>
        </div>
        <button class="icon-button" id="settings-button" data-bs-toggle="modal"
          data-bs-target="#config-modal">
          <i class="fa fa-gear"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="container-fluid mt-3 card-container">
    <div class="row cards-row g-3">
      <div class="col-md-6 col-12 mb-3">
        <div class="card tool-card h-100" id="targets-card">
          <div class="card-body d-flex flex-column">
            <div class="row">
              <div class="col-auto">
                <img src="{{url_for('static', filename='lidarr.svg')}}" alt="Logo" class="logo">
              </div>
              <div class="col-auto d-flex align-items-center justify-content-start p-0">
                <h2 class="panel-title mb-0">Library Targets</h2>
              </div>
            </div>
            <div class="btn-group mt-1">
              <button class="btn btn-primary w-100" id="refresh-targets-btn">
                <span class="spinner-border spinner-border-sm d-none" id="targets-spinner" role="status"
                  aria-hidden="true"></span>
                Refresh
              </button>
            </div>
            <div class="container non-scrollable my-1 p-0" id="select-all">
              <div id="targets-progress-status-bar" class="progress">
                <div class="progress-bar-striped bg-success" role="progressbar" aria-valuenow="100" aria-valuemin="0"
                  aria-valuemax="100"></div>
              </div>
            </div>
            <div class="container scrollable p-0">
              <div class="table">
                <table class="table table-striped" id="targets-table">
                  <thead class="thead-sticky">
                    <tr>
                      <th>Track</th>
                      <th>Album</th>
                      <th class="text-center">Duration</th>
                    </tr>
                  </thead>
                  <tbody>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-12 mb-3">
        <div class="card tool-card h-100" id="sync-card">
          <div class="card-body d-flex flex-column">
            <div class="row">
              <div class="col-auto">
                <img src="{{url_for('static', filename='yt_dlp.png')}}" alt="Logo" class="logo">
              </div>
              <div class="col-auto d-flex align-items-center justify-content-start p-0">
                <h2 class="panel-title mb-0">Clip Sync</h2>
              </div>
            </div>
            <div class="btn-group mt-1">
              <button class="btn btn-primary w-100 " id="start-sync-btn">
                <span class="spinner-border spinner-border-sm d-none" id="sync-spinner" role="status"
                  aria-hidden="true"></span>
                Sync</button>
            </div>
            <div class="container non-scrollable my-1 p-0" id="progress-bar">
              <div id="sync-progress-status-bar" class="progress">
                <div class="progress-bar-striped bg-success" role="progressbar" aria-valuenow="100" aria-valuemin="0"
                  aria-valuemax="100"></div>
              </div>
            </div>
            <div class="summary-grid my-2" id="summary-grid">
              <div><span>Targets</span><strong id="summary-targets">0</strong></div>
              <div><span>Downloaded</span><strong id="summary-downloaded">0</strong></div>
              <div><span>No Match</span><strong id="summary-no-match">0</strong></div>
              <div><span>Errors</span><strong id="summary-errors">0</strong></div>
            </div>
            <div class="container scrollable p-0">
              <div class="table">
                <table class="table table-striped" id="clips-table">
                  <thead class="thead-sticky">
                    <tr>
                      <th>Metric</th>
                      <th class="text-center">Value</th>
                    </tr>
                  </thead>
                  <tbody>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="config-modal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
    aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Configuration</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>

        </div>
        <div class="modal-body">
          <div class="form-group-modal">
            <label for="lidarr-address">Lidarr Address:</label>
            <input type="text" class="form-control" id="lidarr-address" readonly>
          </div>
          <div class="form-group-modal my-3">
            <label for="navidrome-address">Navidrome Address:</label>
            <input type="text" class="form-control" id="navidrome-address" readonly>
          </div>
          <div class="form-group-modal my-3">
            <label for="clip-output-mode">Output Mode:</label>
            <input type="text" class="form-control" id="clip-output-mode" readonly>
          </div>
          <div class="form-group-modal my-3">
            <label for="clip-output-path">Output Path:</label>
            <input type="text" class="form-control" id="clip-output-path" readonly>
          </div>
          <div class="form-group-modal">
            <label for="sync-schedule">Sync Schedule:</label>
            <input type="text" class="form-control" id="sync-schedule" readonly>
          </div>
          <div class="form-group-modal my-3">
            <label for="sync-artist-allowlist">Artist Allowlist:</label>
            <input type="text" class="form-control" id="sync-artist-allowlist" readonly>
          </div>
          <div class="form-group-modal my-3">
            <label for="max-targets-per-run">Max Targets Per Run:</label>
            <input type="text" class="form-control" id="max-targets-per-run" readonly>
          </div>
          <div class="form-group-modal">
            <label for="download-enabled">Downloads Enabled:</label>
            <input type="text" class="form-control" id="download-enabled" readonly>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <i class="fa fa-sun"></i>
          <div class="form-check form-switch">
            <input class="form-check-input rounded" type="checkbox" id="theme-switch">
          </div>
          <i class="fa fa-moon"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast-template" class="toast d-none" role="alert" aria-live="assertive" aria-atomic="true"
      data-bs-delay="5000">
      <div class="toast-header">
        <strong class="me-auto"></strong>
        <small class="text-muted"></small>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body"></div>
    </div>
  </div>

  <script src="{{url_for('static',filename='script.js')}}"></script>
</body>

</html>
